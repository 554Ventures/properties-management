# CI quality gates (deployment plan §6). Every PR and every push to main runs
# the same checks; the API test suite boots its own throwaway embedded
# Postgres, so no service containers are needed. The deploy stage is a
# template at the bottom — enable it once the Cloudflare/Supabase secrets
# exist in a `production` GitHub Environment (plan §7).
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema apps/api/prisma/schema.prisma

      - name: Typecheck
        run: npm run typecheck

      - name: Test (API boots embedded Postgres; chat runs in mock mode)
        run: npm run test

      - name: Build (web bundle + API dist)
        run: npm run build

      - name: Build API container image
        run: docker build -f apps/api/Dockerfile -t hearth-api:${{ github.sha }} .

