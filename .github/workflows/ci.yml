# CI quality gates + deploy (deployment plan §6). Every PR and every push to
# main runs the checks; the API test suite boots its own throwaway embedded
# Postgres, so no service containers are needed. Merges to main additionally
# run migrations against Supabase and deploy the Worker (web assets + API
# container) via wrangler, using the `production` GitHub Environment.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema apps/api/prisma/schema.prisma

      - name: Typecheck
        run: npm run typecheck

      - name: Test (API boots embedded Postgres; chat runs in mock mode)
        run: npm run test

      - name: Build (web bundle + API dist)
        run: npm run build

      - name: Build API container image
        run: docker build -f apps/api/Dockerfile -t hearth-api:${{ github.sha }} .

  # ── deploy (plan §6 "on merge to main") ─────────────────────────────────────
  # Secrets/variables live in the `production` GitHub Environment:
  #   secrets: DATABASE_URL_DIRECT (Supabase session pooler — IPv4-safe),
  #            CLOUDFLARE_API_TOKEN
  #   vars:    CLOUDFLARE_ACCOUNT_ID, VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
  deploy:
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - run: npm ci

      - name: Build web bundle (Supabase auth mode baked in)
        run: npm run build --workspace apps/web
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}

      - name: Run migrations (additive-first — plan §6.1)
        run: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DIRECT }}

      - name: Deploy Worker (web assets + API container)
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test
        run: curl -fsS --retry 5 --retry-delay 10 https://app.554properties.com/api/v1/healthz
